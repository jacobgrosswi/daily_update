# AI newsletters to curate. Add/remove entries here; the daily run reads this file.
# `active: false` skips a sender without removing it.
#
# `sender` may be either a full email address (exact match) or a bare domain
# (matches any address from that domain). Use full addresses for shared-domain
# hosts like substack.com and mail.beehiiv.com.
newsletters:
  - name: TLDR AI
    sender: tldrnewsletter.com
    active: true
  - name: The Rundown
    sender: daily.therundown.ai
    active: true
  - name: AI Breakfast
    sender: aibreakfast@mail.beehiiv.com
    active: true
  - name: Ben's Bites
    sender: bensbites@substack.com
    active: true
  - name: Superhuman AI
    sender: mail.joinsuperhuman.ai
    active: true

# User preferences for briefing curation. Editable by hand; also updated by the
# feedback loop (replies to a briefing) and by the weekly tune-up workflow.

# Skip briefing generation entirely (e.g. vacation). Workflow still runs but no-ops.
paused: false

# Newsletter curation (Section 4.4 of SCOPING).
newsletters:
  top_n: 5
  item_length_sentences: [2, 7]
  rules:
    - id: cross_newsletter_signal
      description: Stories repeated across 3+ newsletters are boosted as a signal of importance.
      weight: 2.0
    - id: material_ai_news
      description: Material AI news (model releases, major funding, regulatory developments, notable enterprise adoption, research breakthroughs, infrastructure shifts) is included on its own merits regardless of any finance angle.
      weight: 1.5
    - id: finance_relevance
      description: Stories with a genuine, source-backed finance, FP&A, or accounting implication get a small boost. Do not invent or stretch one to fit.
      weight: 1.2
  default_buckets:
    - model releases
    - major funding
    - regulatory news
    - enterprise AI adoption
    - research breakthroughs
    - infrastructure shifts

# Email bucketing (Section 4.1).
email:
  drop_senders_matching:
    - "noreply@"
    - "no-reply@"
    - "donotreply@"
    - "notifications@"
    - "mailer-daemon@"
  buckets:
    orders_shipping:
      sender_keywords: [amazon, ups, fedex, usps, dhl, shopify, rockauto]
      subject_keywords: [shipped, delivered, "out for delivery", tracking]
    appointments:
      sender_keywords: [calendly, "outlook.office.com", "google calendar"]
      subject_keywords: [appointment, "meeting confirmation", reschedule, reminder]

# Cost guardrail (Section 5).
budget:
  per_run_max_usd: 0.25
  monthly_target_usd: 5.00
